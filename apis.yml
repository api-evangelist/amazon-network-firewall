aid: amazon-network-firewall
name: Amazon Network Firewall
description: >-
  AWS Network Firewall is a stateful, managed, network firewall and intrusion
  detection and prevention service for your virtual private cloud (VPC). It
  enables you to filter traffic at the perimeter of your VPC with a flexible
  rules engine with support for thousands of custom rules.
